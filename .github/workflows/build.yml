name: Build and Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -match "^refs/tags/v(.+)$") {
            $ver = $Matches[1]
          } else {
            $desc = (git describe --tags --abbrev=0 2>$null) ; $null = $LASTEXITCODE
            if ($desc -match "^v(.+)$") {
              $ver = $Matches[1]
            } else {
              $ver = "0.0.0"
            }
          }
          echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build
        run: dotnet build Em68030/Em68030.csproj -c Release -p:AppVersion=${{ steps.version.outputs.APP_VERSION }}

      - name: Test
        run: dotnet test Em68030.Tests/Em68030.Tests.csproj -c Release

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet publish Em68030/Em68030.csproj -c Release -r win-x64 --no-self-contained -p:AppVersion=${{ steps.version.outputs.APP_VERSION }} -o publish

      - name: Install Inno Setup
        if: startsWith(github.ref, 'refs/tags/v')
        run: choco install innosetup -y --no-progress

      - name: Build installer
        if: startsWith(github.ref, 'refs/tags/v')
        run: iscc installer/setup.iss /DAppVersion=${{ github.ref_name }} /DArch=x64

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: Em68030-CsWpf
          path: installer/Output/Em68030-WPF-Setup-*-*.exe

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release upload ${{ github.ref_name }} installer/Output/Em68030-WPF-Setup-*-*.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

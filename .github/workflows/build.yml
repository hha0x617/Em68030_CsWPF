name: Build and Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build Em68030/Em68030.csproj -c Release

      - name: Test
        run: dotnet test Em68030.Tests/Em68030.Tests.csproj -c Release

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet publish Em68030/Em68030.csproj -c Release -r win-x64 --no-self-contained -o publish

      - name: Install Inno Setup
        if: startsWith(github.ref, 'refs/tags/v')
        run: choco install innosetup -y --no-progress

      - name: Build installer
        if: startsWith(github.ref, 'refs/tags/v')
        run: iscc installer/setup.iss /DAppVersion=${{ github.ref_name }} /DSourceDir=publish

      - name: Upload artifact
        id: upload
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: Em68030-CsWpf
          path: installer/Output/Em68030-Setup-*.exe

  sign:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Sign with SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '<SIGNPATH_ORGANIZATION_ID>'
          project-slug: '<SIGNPATH_PROJECT_SLUG>'
          signing-policy-slug: '<SIGNPATH_SIGNING_POLICY_SLUG>'
          artifact-configuration-slug: '<SIGNPATH_ARTIFACT_CONFIGURATION_SLUG>'
          github-artifact-id: '${{ needs.build.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: signed/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: signed/Em68030-Setup-*.exe

name: Build and Test

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -match "^refs/tags/v(.+)$") {
            $ver = $Matches[1]
          } else {
            $desc = (git describe --tags --abbrev=0 2>$null) ; $null = $LASTEXITCODE
            if ($desc -match "^v(.+)$") {
              $ver = $Matches[1]
            } else {
              $ver = "0.0.0"
            }
          }
          echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build
        run: dotnet build Em68030/Em68030.csproj -c Release -p:AppVersion=${{ steps.version.outputs.APP_VERSION }}

      - name: Test
        run: dotnet test Em68030.Tests/Em68030.Tests.csproj -c Release

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet publish Em68030/Em68030.csproj -c Release -r win-x64 --no-self-contained -p:AppVersion=${{ steps.version.outputs.APP_VERSION }} -o publish

      - name: Install Inno Setup
        if: startsWith(github.ref, 'refs/tags/v')
        run: choco install innosetup -y --no-progress

      - name: Build installer
        if: startsWith(github.ref, 'refs/tags/v')
        run: iscc installer/setup.iss /DAppVersion=${{ github.ref_name }} /DArch=x64

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: Em68030-CsWpf
          path: installer/Output/Em68030-WPF-Setup-*-*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          INSTALLER=$(ls installer/Output/Em68030-WPF-Setup-*-*.exe | head -1)
          INSTALLER_NAME=$(basename "$INSTALLER")
          gh release create "$TAG" "$INSTALLER" --title "$TAG" --notes "$(cat <<EOF
          ## Em68030 ${TAG} (C#/WPF)

          MC68030/MVME147 emulator — Windows x64 installer.

          ### Assets
          - **${INSTALLER_NAME}** — Windows x64 installer (requires .NET 8.0 Desktop Runtime)

          ### Installation
          Run the installer. Requires [.NET 8.0 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/8.0).
          Settings are saved to \`%LOCALAPPDATA%\\Em68030_CsWPF\\\`.

          ### Source Code (Apache-2.0)
          - **Repository**: [Em68030_CsWPF](https://github.com/${{ github.repository }})
          - **Build workflow**: [.github/workflows/build.yml](https://github.com/${{ github.repository }}/blob/${TAG}/.github/workflows/build.yml)
          EOF
          )"

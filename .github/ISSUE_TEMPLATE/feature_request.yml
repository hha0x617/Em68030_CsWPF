name: Feature request
description: Suggest a new CPU feature, device, debugger capability, or UI improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - CPU core (ISA, addressing modes, cycles, exceptions)
        - MMU / memory model
        - FPU
        - JIT
        - MVME147 peripherals / additional devices
        - Debugger (breakpoints, watchpoints, call stack)
        - Console / framebuffer
        - Settings / configuration
        - Build / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation — what problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: notes
    attributes:
      label: Additional context / references (datasheets, prior art)
